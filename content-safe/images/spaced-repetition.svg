<svg width="100%" height="100%" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1000" height="600" fill="#111111"/>

  <!-- Day/Night cycle -->
  <circle cx="400" cy="280" r="180" stroke="#333" stroke-width="3" fill="none"/>

  <!-- Sun -->
  <circle cx="400" cy="80" r="20" fill="#FFD54F"/>

  <!-- Moon -->
  <path d="M400 480 A20 20 0 1 0 420 460 A15 15 0 1 1 400 480" fill="#90CAF9"/>

  <!-- Clock (centerpiece) -->
  <circle cx="400" cy="280" r="70" fill="#1E1E1E" stroke="#777" stroke-width="3"/>
  <line x1="400" y1="280" x2="400" y2="230" stroke="#fff" stroke-width="4"/>
  <line x1="400" y1="280" x2="450" y2="280" stroke="#fff" stroke-width="4"/>

  <!-- Left Books (bigger) -->
  <rect x="120" y="230" width="80" height="16" fill="#4CAF50"/>
  <rect x="120" y="255" width="80" height="16" fill="#66BB6A"/>
  <rect x="120" y="280" width="80" height="16" fill="#81C784"/>

  <!-- Right Books (bigger) -->
  <rect x="600" y="230" width="80" height="16" fill="#42A5F5"/>
  <rect x="600" y="255" width="80" height="16" fill="#64B5F6"/>
  <rect x="600" y="280" width="80" height="16" fill="#90CAF9"/>

  <!-- Arrows (stronger loop) -->
  <path d="M180 120 A260 260 0 0 1 620 120" fill="none" stroke="#888" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M620 440 A260 260 0 0 1 180 440" fill="none" stroke="#888" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#888"/>
    </marker>
  </defs>
<text x="400" y="360" text-anchor="middle" fill="#ccc" font-size="20">
  Repeat Over Time
</text>

<text x="160" y="210" fill="#aaa" font-size="16">
  Study
</text>

<text x="610" y="210" fill="#aaa" font-size="16">
  Review
</text>
</svg>