
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Taleem Player</title>

  <!-- Player Styles -->
  <link rel="stylesheet" href="./player/themes/default.css" />
  <link rel="stylesheet" href="./player/taleem.css" />
</head>

<body>

  <!-- Player Mount -->
  <div id="app"></div>

  <!-- Basic Controls -->
  <div class="nav-test">
    <button id="play-btn">▶</button>
    <button id="pause-btn">⏸</button>
    <button id="stop-btn">⏹</button>

    <span id="time">0.0s</span>

    <div class="scrub-wrap">
      <input
        id="scrub"
        type="range"
        min="0"
        max="1"
        step="0.1"
      />
    </div>
  </div>

  <script type="module">
    import {
      createTaleemPlayer,
      resolveAssetPaths,
      resolveBackground,
      getDeckEndTime,
      createAudioTimer,
      createSilentTimer,
      startLoop
    } from "./player/taleem-player-app.js";

    async function init() {

      // ----------------------------------
      // 1️⃣ Get deck from URL
      // ----------------------------------
      const params = new URLSearchParams(window.location.search);
      const deckKey = params.get("deck");

      if (!deckKey) {
        document.body.innerHTML = "<h2>No deck specified</h2>";
        throw new Error("Missing deck key");
      }

      // ----------------------------------
      // 2️⃣ contentBase is fixed empty
      // ----------------------------------
      const contentBase = ".";

      const deckUrl = `${contentBase}/decks/${deckKey}.json`;
      const imageBase = `${contentBase}/images/`;
      const audioBase = `${contentBase}/audio/`;

      // ----------------------------------
      // 3️⃣ Fetch deck
      // ----------------------------------
      const res = await fetch(deckUrl);

      if (!res.ok) {
        document.body.innerHTML = "<h2>Deck not found</h2>";
        throw new Error("Deck not found");
      }

      const deck = await res.json();

      // ----------------------------------
      // 4️⃣ Resolve images
      // ----------------------------------
      resolveAssetPaths(deck, imageBase);
      resolveBackground(deck, imageBase);

      // ----------------------------------
      // 5️⃣ Audio from deck.audio
      // ----------------------------------
      let timer;

      if (deck.audio) {
        timer = createAudioTimer(`${audioBase}${deck.audio}`);
      } else {
        timer = createSilentTimer();
      }

      // ----------------------------------
      // 6️⃣ Create player
      // ----------------------------------
      const player = createTaleemPlayer({
        mount: "#app",
        deck
      });

      const duration = getDeckEndTime(deck);

      // ----------------------------------
      // 7️⃣ Start playback loop
      // ----------------------------------
      startLoop({
        player,
        timer,
        duration,
        ui: {
          playBtn: document.getElementById("play-btn"),
          pauseBtn: document.getElementById("pause-btn"),
          stopBtn: document.getElementById("stop-btn"),
          scrub: document.getElementById("scrub"),
          timeEl: document.getElementById("time")
        }
      });
    }

    init();
  </script>

</body>
</html>
