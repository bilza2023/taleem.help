<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="800" height="450" fill="#0f172a"/>

  <!-- Soft grid (very subtle texture) -->
  <g opacity="0.05">
    <line x1="0" y1="50" x2="800" y2="50" stroke="#fff"/>
    <line x1="0" y1="100" x2="800" y2="100" stroke="#fff"/>
    <line x1="0" y1="150" x2="800" y2="150" stroke="#fff"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#fff"/>
    <line x1="0" y1="250" x2="800" y2="250" stroke="#fff"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#fff"/>
  </g>

  <!-- Main container circle -->
  <circle cx="400" cy="230" r="170" stroke="#94a3b8" stroke-width="2" fill="none"/>

  <!-- Split line -->
  <line x1="400" y1="60" x2="400" y2="400" stroke="#334155" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="50" fill="#e2e8f0" font-size="26" text-anchor="middle" font-weight="600">
    Real Numbers
  </text>

  <!-- LEFT: Rational -->
  <text x="260" y="120" fill="#38bdf8" font-size="18" text-anchor="middle" font-weight="600">
    Rational
  </text>

  <!-- Rational examples -->
  <text x="260" y="180" fill="#e2e8f0" font-size="16" text-anchor="middle">1/2 → 0.5</text>
  <text x="260" y="210" fill="#e2e8f0" font-size="16" text-anchor="middle">3/4 → 0.75</text>
  <text x="260" y="240" fill="#e2e8f0" font-size="16" text-anchor="middle">1/3 → 0.333…</text>

  <!-- subtle box -->
  <rect x="170" y="150" width="180" height="120" rx="12" fill="#1e293b" opacity="0.6"/>

  <!-- RIGHT: Irrational -->
  <text x="540" y="120" fill="#facc15" font-size="18" text-anchor="middle" font-weight="600">
    Irrational
  </text>

  <!-- Irrational examples -->
  <text x="540" y="180" fill="#e2e8f0" font-size="16" text-anchor="middle">√2</text>
  <text x="540" y="210" fill="#e2e8f0" font-size="16" text-anchor="middle">π</text>
  <text x="540" y="240" fill="#e2e8f0" font-size="16" text-anchor="middle">1.414213…</text>

  <!-- subtle box -->
  <rect x="450" y="150" width="180" height="120" rx="12" fill="#1e293b" opacity="0.6"/>

  <!-- Bottom hint -->
  <text x="400" y="410" fill="#64748b" font-size="14" text-anchor="middle">
    All numbers we use belong here
  </text>

</svg>