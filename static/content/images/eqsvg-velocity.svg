<svg viewBox="0 0 640 360" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">

  <rect width="640" height="360" fill="#0b132b"/>

  <!-- Equation -->
  <text x="320" y="70" fill="#ffffff" font-size="36" text-anchor="middle">
    velocity = speed + direction
  </text>

  <!-- Base arrow (speed) -->
  <line x1="120" y1="200" x2="360" y2="200"
        stroke="#ffd60a" stroke-width="8" stroke-linecap="round"/>
  <text x="370" y="205" fill="#ffd60a" font-size="30">→</text>

  <!-- Direction arrow -->
  <line x1="360" y1="200" x2="520" y2="100"
        stroke="#ff4d6d" stroke-width="8" stroke-linecap="round"/>
  <text x="530" y="110" fill="#ff4d6d" font-size="30">↗</text>

  <!-- Labels -->
  <text x="260" y="170" fill="#ffd60a" font-size="22" text-anchor="middle">
    speed
  </text>

  <text x="460" y="90" fill="#ff4d6d" font-size="22" text-anchor="middle">
    direction
  </text>

  <!-- Compass -->
  <text x="520" y="260" fill="#aaa" font-size="20">N ↑</text>

  <!-- Icon row -->
  <text x="280" y="310" fill="#aaa" font-size="26">📈</text>
  <text x="340" y="310" fill="#aaa" font-size="26">→</text>
  <text x="400" y="310" fill="#aaa" font-size="26">🧭</text>

</svg>