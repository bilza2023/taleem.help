<svg viewBox="0 0 640 360" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="640" height="360" fill="#0b132b"/>

  <!-- Road -->
  <line x1="80" y1="220" x2="560" y2="220" stroke="#aaa" stroke-dasharray="10 6"/>

  <!-- Distance markers -->
  <line x1="200" y1="200" x2="200" y2="240" stroke="#fff" stroke-width="2"/>
  <line x1="400" y1="200" x2="400" y2="240" stroke="#fff" stroke-width="2"/>

  <!-- Arrow -->
  <line x1="120" y1="160" x2="440" y2="160" stroke="#ffd60a" stroke-width="6"/>
  <polygon points="440,160 410,145 410,175" fill="#ffd60a"/>

  <!-- Formula -->
  <text x="320" y="80" fill="#ffffff" font-size="28" text-anchor="middle">
    speed = distance / time
  </text>

  <!-- Labels -->
  <text x="200" y="300" fill="#aaa" font-size="20" text-anchor="middle">d</text>
  <text x="400" y="300" fill="#aaa" font-size="20" text-anchor="middle">t ⏱</text>

</svg>