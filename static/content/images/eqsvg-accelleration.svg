  <!-- Small arrow -->
  <line x1="160" y1="200" x2="300" y2="200" stroke="#888" stroke-width="6" stroke-linecap="round"/>
  <text x="310" y="205" fill="#888" font-size="28">→</text>

  <!-- Big arrow -->
  <line x1="300" y1="200" x2="540" y2="200" stroke="#00ff88" stroke-width="10" stroke-linecap="round"/>
  <text x="550" y="205" fill="#00ff88" font-size="32">→</text>

  <!-- Concept -->
  <text x="320" y="140" fill="#00ff88" font-size="26" text-anchor="middle">
    Δv ↑
  </text>

  <!-- Icon row -->
  <text x="260" y="300" fill="#aaa" font-size="26">⏱️</text>
  <text x="320" y="300" fill="#aaa" font-size="26">📈</text>
  <text x="380" y="300" fill="#aaa" font-size="26">↑</text>

</svg>