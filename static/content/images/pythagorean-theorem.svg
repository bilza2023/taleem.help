<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1280" height="720" fill="#0b132b"></rect>

  <!-- Title -->
  <text x="640" y="80" text-anchor="middle" fill="#ffffff" font-size="44">
    Pythagorean Theorem
  </text>

  <!-- Group scaled slightly -->
  <g transform="translate(0,-20) scale(0.9) translate(60,60)">

    <!-- Triangle -->
    <polygon points="400,500 400,300 650,500" fill="#ffffff" opacity="0.06" stroke="#ffffff" stroke-width="3"></polygon>

    <!-- Right angle -->
    <rect x="400" y="470" width="30" height="30" fill="#f4d35e"></rect>

    <!-- Square a -->
    <rect x="200" y="300" width="200" height="200" fill="#3a86ff" opacity="0.25" stroke="#ffffff" stroke-width="2"></rect>
    <text x="300" y="390" text-anchor="middle" fill="#ffffff" font-size="28">a²</text>

    <!-- Square b -->
    <rect x="400" y="500" width="250" height="250" fill="#ffd60a" opacity="0.25" stroke="#ffffff" stroke-width="2"></rect>
    <text x="525" y="640" text-anchor="middle" fill="#000" font-size="28">b²</text>

    <!-- Square c -->
    <polygon points="
      400,300
      650,500
      770,380
      520,180
    " fill="#ff4d6d" opacity="0.3" stroke="#ffffff" stroke-width="2"></polygon>
    <text x="580" y="340" text-anchor="middle" fill="#ffffff" font-size="28">c²</text>

  </g>

  <!-- Divider -->
  <line x1="720" y1="150" x2="720" y2="650" stroke="#ffffff" opacity="0.2"></line>

  <!-- Right side -->
  <rect x="800" y="360" width="80" height="80" fill="#3a86ff" opacity="0.3"></rect>
  <text x="840" y="410" text-anchor="middle" fill="#ffffff" font-size="24">a²</text>

  <text x="900" y="410" fill="#ffffff" font-size="36">+</text>

  <rect x="940" y="330" width="110" height="110" fill="#ffd60a" opacity="0.35"></rect>
  <text x="995" y="395" text-anchor="middle" fill="#000" font-size="26">b²</text>

  <text x="1060" y="410" fill="#ffffff" font-size="36">=</text>

  <rect x="1100" y="300" width="140" height="140" fill="#ff4d6d" opacity="0.35"></rect>
  <text x="1170" y="380" text-anchor="middle" fill="#ffffff" font-size="28">c²</text>

  <!-- Branding -->
  <text x="1180" y="690" fill="#888" font-size="18" text-anchor="end">
    taleem.help
  </text>

</svg>