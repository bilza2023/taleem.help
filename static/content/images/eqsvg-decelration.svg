<svg viewBox="0 0 640 360" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="640" height="360" fill="#0b132b"/>

  <!-- Big equation -->
  <text x="320" y="80" fill="#ffffff" font-size="40" text-anchor="middle">
    a &lt; 0
  </text>

  <!-- Car icon (simple block style) -->
  <rect x="120" y="180" width="80" height="40" rx="8" fill="#3a86ff"/>
  <circle cx="140" cy="230" r="8" fill="#fff"/>
  <circle cx="180" cy="230" r="8" fill="#fff"/>

  <!-- Speed arrows (shrinking) -->
  <line x1="220" y1="200" x2="420" y2="200"
        stroke="#ff6b6b" stroke-width="10" stroke-linecap="round"/>
  <text x="430" y="205" fill="#ff6b6b" font-size="28">→</text>

  <line x1="420" y1="200" x2="500" y2="200"
        stroke="#888" stroke-width="6" stroke-linecap="round"/>
  <text x="505" y="205" fill="#888" font-size="22">→</text>

  <!-- Concept label -->
  <text x="320" y="130" fill="#ff6b6b" font-size="24" text-anchor="middle">
    slowing down ↓
  </text>

  <!-- Icons row (concept hints) -->
  <text x="260" y="300" fill="#aaa" font-size="22">v →</text>
  <text x="320" y="300" fill="#aaa" font-size="22">Δ</text>
  <text x="380" y="300" fill="#aaa" font-size="22">⏱</text>

</svg>